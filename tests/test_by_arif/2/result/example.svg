    </style><text x="20" y="50" class="diagram-title">NetworkFlow</text><rect x="585.6616" y="180" width="120" height="60" rx="5" class="node" /><text x="645.6616" y="215" text-anchor="middle" class="label">server</text><rect x="476.21524" y="180" width="120" height="60" rx="5" class="node" /><text x="536.2152" y="215" text-anchor="middle" class="label">node</text><rect x="323.78482" y="180" width="120" height="60" rx="5" class="node" /><text x="383.78482" y="215" text-anchor="middle" class="label">client</text><text x="20" y="480" class="diagram-title">Packet: TCPHeader</text><rect x="20" y="510" width="120" height="50" rx="0" class="node" fill="#e3f2fd" /><text x="80" y="530" text-anchor="middle" class="label">source_port</text><text x="80" y="545" text-anchor="middle" font-size="10px" fill="#666">0..15</text><rect x="140" y="510" width="120" height="50" rx="0" class="node" fill="#e3f2fd" /><text x="200" y="530" text-anchor="middle" class="label">dest_port</text><text x="200" y="545" text-anchor="middle" font-size="10px" fill="#666">16..31</text><rect x="260" y="510" width="120" height="50" rx="0" class="node" fill="#e3f2fd" /><text x="320" y="530" text-anchor="middle" class="label">seq_num</text><text x="320" y="545" text-anchor="middle" font-size="10px" fill="#666">32..63</text><rect x="380" y="510" width="120" height="50" rx="0" class="node" fill="#e3f2fd" /><text x="440" y="530" text-anchor="middle" class="label">ack_num</text><text x="440" y="545" text-anchor="middle" font-size="10px" fill="#666">64..95</text><rect x="500" y="510" width="120" height="50" rx="0" class="node" fill="#e3f2fd" /><text x="560" y="530" text-anchor="middle" class="label">flags_and_window</text><text x="560" y="545" text-anchor="middle" font-size="10px" fill="#666">96..159</text><text x="20" y="610" class="diagram-title">State Machine: ConnectionState</text><circle cx="50" cy="640" r="30" class="node" fill="#fafafa" /><text x="50" y="640" text-anchor="middle" class="label" dy=".3em">C