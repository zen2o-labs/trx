le cx="200" cy="804" r="30" class="node" fill="#fafafa" /><text x="200" y="804" text-anchor="middle" class="label" dy=".3em">Idle</text><circle cx="350" cy="804" r="30" class="node" fill="#fafafa" /><text x="350" y="804" text-anchor="middle" class="label" dy=".3em">Running</text><circle cx="500" cy="804" r="30" class="node" fill="#fafafa" /><text x="500" y="804" text-anchor="middle" class="label" dy=".3em">Stopped</text><line x1="80" y1="804" x2="170" y2="804" class="connection" stroke-dasharray="5,5" /><text x="125" y="794" text-anchor="middle" font-size="10px" fill="#d32f2f">init</text><line x1="230" y1="804" x2="320" y2="804" class="connection" stroke-dasharray="5,5" /><text x="275" y="794" text-anchor="middle" font-size="10px" fill="#d32f2f">start</text><line x1="380" y1="804" x2="320" y2="804" class="connection" stroke-dasharray="5,5" /><text x="350" y="794" text-anchor="middle" font-size="10px" fill="#d32f2f">processing</text><line x1="380" y1="804" x2="470" y2="804" class="connection" stroke-dasharray="5,5" /><text x="425" y="794" text-anchor="middle" font-size="10px" fill="#d32f2f">stop</text><line x1="530" y1="804" x2="20" y2="804" class="connection" stroke-dasharray="5,5" /><text x="275" y="794" text-anchor="middle" font-size="10px" fill="#d32f2f">shutdown</text><text x="20" y="904" class="diagram-title">XY Chart: PerformanceChart</text><line x1="50" y1="1134" x2="450" y2="1134" stroke="#333" stroke-width="2" /><line x1="50" y1="1134" x2="50" y2="934" stroke="#333" stroke-width="2" /><text x="250" y="1154" text-anchor="middle" font-size="12px">Time (ms)</text><text x="50" y="1034" text-anchor="middle" font-size="12px" transform="rotate(-90 50 1034)" dy="-30">Load (%)</text><polyline points="50.00,1112.95 150.00,1039.26 250.00,955.05 350.00,1028.74 450.00,934.00" fill="none" stroke="#e91e63" stroke-width="3" /><text x="70" y="954" font-size="12px" fill="#1976d2">Data Source: 0,10 100,45 200,85 300,50 400,95</text>
<script type="text/javascript">
<![CDATA[
(function() {
    const svg = document.documentElement;
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let viewBoxX = 0;
    let viewBoxY = 0;
    let viewBoxWidth = 0;
    let viewBoxHeight = 0;

    function parseViewBox() {
        const vb = svg.getAttribute("viewBox");
        if (vb) {
            const parts = vb.split(" ").map(Number);
            if (parts.length === 4) {
                viewBoxX = parts[0];
                viewBoxY = parts[1];
                viewBoxWidth = parts[2];
                viewBoxHeight = parts[3];
            }
        }
    }

    parseViewBox();

    svg.addEventListener("mousedown", (e) => {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        svg.style.cursor = "grabbing";
    });

    svg.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        const clientRect = svg.getBoundingClientRect();
        const scaleX = viewBoxWidth / clientRect.width;
        const scaleY = viewBoxHeight / clientRect.height;

        viewBoxX -= dx * scaleX;
        viewBoxY -= dy * scaleY;

        svg.setAttribute("viewBox", `${viewBoxX} ${viewBoxY} ${viewBoxWidth} ${viewBoxHeight}`);

        startX = e.clientX;
        startY = e.clientY;
    });

    const stopDragging = () => {
        isDragging = false;
        svg.style.cursor = "grab";
    };

    svg.addEventListener("mouseup", stopDragging);
    svg.addEventListener("mouseleave", stopDragging);

    svg.addEventListener("wheel", (e) => {
        e.preventDefault();
        parseViewBox();
        const clientRect = svg.getBoundingClientRect();
        const mouseX = e.clientX - clientRect.left;
        const mouseY = e.clientY - clientRect.top;

        const svgX = viewBoxX + (mouseX / clientRect.width) * viewBoxWidth;
        const svgY = viewBoxY + (mouseY / clientRect.height) * viewBoxHeight;

        const zoomFactor = 1.0 + (e.deltaY * 0.001);

        viewBoxWidth *= zoomFactor;
        viewBoxHeight *= zoomFactor;

        viewBoxX = svgX - (mouseX / clientRect.width) * viewBoxWidth;
        viewBoxY = svgY - (mouseY / clientRect.height) * viewBoxHeight;

        svg.setAttribute("viewBox", `${viewBoxX} ${viewBoxY} ${viewBoxWidth} ${viewBoxHeight}`);
    }, { passive: false });
})();
]]>
</script>
</svg>