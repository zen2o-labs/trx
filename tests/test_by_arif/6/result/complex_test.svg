    </style><text x="20" y="50" class="diagram-title">Feature Validation Diagram</text><polygon points="389.23395,345 389.23395,375 255,390 120.76607,375 120.76607,345 255,330" class="node" fill="#ffffff" stroke="#334155" stroke-width="2" /><text x="255" y="360" text-anchor="middle" dominant-baseline="middle" class="label">Processor</text><path d="M 70.455,520 C 70.455,504 88.455,504 118.455,504 C 148.455,504 166.455,504 166.455,520 C 166.455,536 148.455,536 118.455,536 C 88.455,536 70.455,536 70.455,520 Z" class="node" fill="#ffffff" stroke="#334155" stroke-width="2" /><text x="118.455" y="520" text-anchor="middle" dominant-baseline="middle" class="label">SubWorker1</text><path d="M 341.545,489.6 A 60,9.599999 0 0,1 461.545,489.6 L 461.545,550.4 A 60,9.599999 0 0,1 341.545,550.4 Z M 341.545,489.6 A 60,9.599999 0 0,0 461.545,489.6" class="node" fill="#ffffff" stroke="#334155" stroke-width="2" /><text x="401.545" y="520" text-anchor="middle" dominant-baseline="middle" class="label">SubWorker2</text><text x="20" y="480" class="diagram-title">Packet: DataHeader</text><rect x="20.000" y="510.000" width="100.000" height="50.000" rx="0" class="node" fill="#e3f2fd" stroke="#334155" stroke-width="1" /><text x="70.000" y="530.000" text-anchor="middle" class="label">protocol_version</text><text x="70.000" y="545.000" text-anchor="middle" font-size="10px" fill="#666">0..7</text><rect x="120.000" y="510.000" width="200.000" height="50.000" rx="0" class="node" fill="#e3f2fd" stroke="#334155" stroke-width="1" /><text x="220.000" y="530.000" text-anchor="middle" class="label">payload_length</text><text x="220.000" y="545.000" text-anchor="middle" font-size="10px" fill="#666">8..23</text><rect x="320.000" y="510.000" width="100.000" height="50.000" rx="0" class="node" fill="#e3f2fd" stroke="#334155" stroke-width="1" /><text x="370.000" y="530.000" text-anchor="middle" class="label">checksum</text><text x="370.000" y="545.000" text-anchor="middle" font-size="10px" fill="#666">24..31