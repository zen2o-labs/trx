ht="50.000" rx="0" class="node" fill="#e3f2fd" stroke="#334155" stroke-width="1" /><text x="560.127" y="230.000" text-anchor="middle" class="label">Flags</text><text x="560.127" y="245.000" text-anchor="middle" font-size="10px" fill="#666">103..108</text><rect x="575.414" y="210.000" width="81.529" height="50.000" rx="0" class="node" fill="#e3f2fd" stroke="#334155" stroke-width="1" /><text x="616.178" y="230.000" text-anchor="middle" class="label">WindowSize</text><text x="616.178" y="245.000" text-anchor="middle" font-size="10px" fill="#666">109..124</text><rect x="656.943" y="210.000" width="81.529" height="50.000" rx="0" class="node" fill="#e3f2fd" stroke="#334155" stroke-width="1" /><text x="697.707" y="230.000" text-anchor="middle" class="label">Checksum</text><text x="697.707" y="245.000" text-anchor="middle" font-size="10px" fill="#666">125..140</text><rect x="738.471" y="210.000" width="81.529" height="50.000" rx="0" class="node" fill="#e3f2fd" stroke="#334155" stroke-width="1" /><text x="779.236" y="230.000" text-anchor="middle" class="label">UrgentPointer</text><text x="779.236" y="245.000" text-anchor="middle" font-size="10px" fill="#666">141..156</text>
<script type="text/javascript">
<![CDATA[
(function() {
    const svg = document.documentElement;
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let viewBoxX = 0;
    let viewBoxY = 0;
    let viewBoxWidth = 0;
    let viewBoxHeight = 0;

    function parseViewBox() {
        const vb = svg.getAttribute("viewBox");
        if (vb) {
            const parts = vb.split(" ").map(Number);
            if (parts.length === 4) {
                viewBoxX = parts[0];
                viewBoxY = parts[1];
                viewBoxWidth = parts[2];
                viewBoxHeight = parts[3];
            }
        }
    }

    parseViewBox();

    svg.addEventListener("mousedown", (e) => {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        svg.style.cursor = "grabbing";
    });

    svg.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        const clientRect = svg.getBoundingClientRect();
        const scaleX = viewBoxWidth / clientRect.width;
        const scaleY = viewBoxHeight / clientRect.height;

        viewBoxX -= dx * scaleX;
        viewBoxY -= dy * scaleY;
        
        svg.setAttribute("viewBox", `${viewBoxX} ${viewBoxY} ${viewBoxWidth} ${viewBoxHeight}`);

        startX = e.clientX;
        startY = e.clientY;
    });

    const stopDragging = () => {
        isDragging = false;
        svg.style.cursor = "grab";
    };

    svg.addEventListener("mouseup", stopDragging);
    svg.addEventListener("mouseleave", stopDragging);

    svg.addEventListener("wheel", (e) => {
        e.preventDefault();
        parseViewBox();
        const clientRect = svg.getBoundingClientRect();
        const mouseX = e.clientX - clientRect.left;
        const mouseY = e.clientY - clientRect.top;
        
        const svgX = viewBoxX + (mouseX / clientRect.width) * viewBoxWidth;
        const svgY = viewBoxY + (mouseY / clientRect.height) * viewBoxHeight;

        const zoomFactor = 1.0 + (e.deltaY * 0.001);
        
        viewBoxWidth *= zoomFactor;
        viewBoxHeight *= zoomFactor;

        viewBoxX = svgX - (mouseX / clientRect.width) * viewBoxWidth;
        viewBoxY = svgY - (mouseY / clientRect.height) * viewBoxHeight;

        svg.setAttribute("viewBox", `${viewBoxX} ${viewBoxY} ${viewBoxWidth} ${viewBoxHeight}`);
    }, { passive: false });
})();
]]>
</script>
</svg>